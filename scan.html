<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>สแกนเข้างาน</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/db.js"></script>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="js/liff-auth.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Sarabun', sans-serif;
      min-height: 100vh;
      background: #07071a;
      color: #e2e8f0;
      display: flex; flex-direction: column; align-items: center;
      padding: 24px 16px 48px;
      position: relative; overflow-x: hidden;
    }

    /* Background */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 55% 45% at 5% 10%,  rgba(16,185,129,0.14) 0%, transparent 55%),
        radial-gradient(ellipse 50% 40% at 95% 90%,  rgba(99,102,241,0.12) 0%, transparent 52%),
        radial-gradient(ellipse 40% 35% at 50% 50%,  rgba(6,182,212,0.06) 0%, transparent 55%);
    }
    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: radial-gradient(circle, rgba(255,255,255,0.028) 1px, transparent 1px);
      background-size: 30px 30px;
      mask-image: radial-gradient(ellipse 85% 85% at 50% 50%, black 20%, transparent 100%);
      -webkit-mask-image: radial-gradient(ellipse 85% 85% at 50% 50%, black 20%, transparent 100%);
    }

    .page-wrap {
      width: 100%; max-width: 560px;
      position: relative; z-index: 1;
      display: flex; flex-direction: column; align-items: center;
      animation: fadeIn 0.45s ease;
    }

    /* ── Top bar ── */
    .top-bar {
      display: flex; align-items: center; justify-content: space-between;
      width: 100%; margin-bottom: 20px;
    }
    .back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      color: #475569; text-decoration: none; font-size: 0.84em;
      padding: 7px 14px; border-radius: 20px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.09);
      transition: all 0.25s ease;
    }
    .back-btn:hover { color: #e2e8f0; background: rgba(255,255,255,0.09); border-color: rgba(255,255,255,0.18); }

    .page-title { font-size: 1.08em; font-weight: 600; color: #a5b4fc; }
    .spacer { width: 80px; }

    /* ── Init Steps ── */
    .init-steps {
      display: flex; align-items: center; gap: 0;
      width: 100%; margin-bottom: 18px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 14px 16px;
      gap: 4px;
    }
    .step-item {
      flex: 1; display: flex; flex-direction: column; align-items: center; gap: 5px;
      position: relative;
    }
    .step-item:not(:last-child)::after {
      content: '';
      position: absolute; top: 12px; left: calc(50% + 14px); right: calc(-50% + 14px);
      height: 1px;
      background: rgba(255,255,255,0.1);
      transition: background 0.4s ease;
    }
    .step-item.done:not(:last-child)::after { background: rgba(16,185,129,0.45); }

    .step-dot {
      width: 24px; height: 24px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      color: #475569;
      transition: all 0.4s ease;
    }
    .step-item.active .step-dot {
      background: rgba(99,102,241,0.2);
      border-color: rgba(99,102,241,0.5);
      color: #a5b4fc;
      box-shadow: 0 0 12px rgba(99,102,241,0.3);
      animation: stepPulse 1.2s ease-in-out infinite;
    }
    .step-item.done .step-dot {
      background: rgba(16,185,129,0.2);
      border-color: rgba(16,185,129,0.5);
      color: #34d399;
      box-shadow: 0 0 10px rgba(16,185,129,0.25);
      animation: none;
    }
    .step-label {
      font-size: 0.64em; color: #334155; font-weight: 500; text-align: center; white-space: nowrap;
      transition: color 0.3s ease;
    }
    .step-item.active .step-label { color: #818cf8; }
    .step-item.done  .step-label  { color: #34d399; }

    /* ── GPS alert ── */
    .gps-alert {
      display: none;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      color: #fca5a5;
      border-radius: 14px; padding: 14px 18px;
      width: 100%; margin-bottom: 14px;
      font-size: 0.88em; font-weight: 600; text-align: center;
      line-height: 1.6;
    }
    .retry-btn {
      display: inline-block; margin-top: 10px;
      background: rgba(239,68,68,0.2);
      border: 1px solid rgba(239,68,68,0.4);
      color: #fca5a5; font-family: 'Sarabun', sans-serif;
      font-size: 0.9em; font-weight: 600;
      padding: 8px 20px; border-radius: 20px; cursor: pointer;
      transition: all 0.25s ease;
    }
    .retry-btn:hover { background: rgba(239,68,68,0.3); }

    /* ── GPS status chip ── */
    #gps-status {
      font-size: 0.78em; color: #334155; text-align: center;
      min-height: 18px; margin-bottom: 10px;
    }

    /* ── Start Button ── */
    #btnStart {
      display: none;
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      color: white; border: none; border-radius: 50px;
      padding: 16px 48px; font-size: 17px; font-weight: 600;
      cursor: pointer; font-family: 'Sarabun', sans-serif;
      box-shadow: 0 4px 28px rgba(99,102,241,0.4);
      margin: 4px auto 16px;
      transition: all 0.3s ease;
      animation: btnGlow 2.2s ease-in-out infinite;
    }
    #btnStart:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 40px rgba(99,102,241,0.6);
      animation: none;
    }

    /* ── Video Container ── */
    .video-container {
      position: relative;
      width: 100%; border-radius: 22px; overflow: hidden;
      background: #050510; min-height: 290px;
      border: 1px solid rgba(255,255,255,0.07);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    video {
      width: 100%; height: auto; display: block;
      transform: scaleX(-1);
      opacity: 0; transition: opacity 0.5s ease;
      border-radius: 22px;
    }
    video.active { opacity: 1; }

    /* Scanner frame corners */
    .scanner-frame { position: absolute; inset: 0; z-index: 5; pointer-events: none; }
    .corner {
      position: absolute; width: 26px; height: 26px;
      border-color: #10b981; border-style: solid; opacity: 0.75;
    }
    .corner-tl { top: 14px;    left: 14px;   border-width: 2.5px 0 0 2.5px; border-radius: 3px 0 0 0; }
    .corner-tr { top: 14px;    right: 14px;  border-width: 2.5px 2.5px 0 0; border-radius: 0 3px 0 0; }
    .corner-bl { bottom: 14px; left: 14px;   border-width: 0 0 2.5px 2.5px; border-radius: 0 0 0 3px; }
    .corner-br { bottom: 14px; right: 14px;  border-width: 0 2.5px 2.5px 0; border-radius: 0 0 3px 0; }

    /* Oval face guide */
    .face-guide {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      z-index: 4; pointer-events: none;
    }
    .face-oval {
      width: 46%; padding-bottom: 60%;
      position: relative; border-radius: 50%;
      border: 2px dashed rgba(99,102,241,0.35);
      box-shadow: 0 0 0 9999px rgba(0,0,0,0.25);
      transition: border-color 0.4s ease;
    }
    .face-oval.detected { border-color: rgba(16,185,129,0.7); border-style: solid; }
    .face-guide-label {
      position: absolute; bottom: -28px; left: 50%; transform: translateX(-50%);
      font-size: 0.72em; color: rgba(255,255,255,0.3); white-space: nowrap;
    }

    /* Scan line */
    .scan-line {
      display: none;
      position: absolute; left: 8%; right: 8%; height: 2px;
      background: linear-gradient(90deg, transparent, #10b981, transparent);
      box-shadow: 0 0 10px rgba(16,185,129,0.8);
      z-index: 6;
      animation: scanMove 2.2s ease-in-out infinite;
    }
    .scan-line.active { display: block; }

    /* Overlay status badge */
    #overlay-status {
      position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.6); backdrop-filter: blur(10px);
      color: #cbd5e1; padding: 6px 18px; border-radius: 30px;
      z-index: 10; white-space: nowrap; font-size: 0.82em;
      border: 1px solid rgba(255,255,255,0.1);
    }

    /* Camera placeholder */
    .cam-placeholder {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 10px; z-index: 3; pointer-events: none;
    }
    .cam-placeholder-icon { font-size: 42px; opacity: 0.18; }
    .cam-placeholder-text { font-size: 0.78em; color: #1e293b; }

    /* ── Modal ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.72); backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px); z-index: 100;
      align-items: flex-end; justify-content: center;
      padding-bottom: env(safe-area-inset-bottom, 0);
    }
    .modal-content {
      background: linear-gradient(160deg, #12122e 0%, #0e1830 100%);
      border: 1px solid rgba(255,255,255,0.12);
      border-bottom: none;
      padding: 28px 26px 32px;
      border-radius: 28px 28px 0 0;
      width: 100%; max-width: 520px;
      text-align: center;
      box-shadow: 0 -20px 60px rgba(0,0,0,0.5);
      display: flex; flex-direction: column; align-items: center;
      animation: sheetUp 0.38s cubic-bezier(0.34, 1.1, 0.64, 1);
    }
    .modal-handle {
      width: 36px; height: 4px; border-radius: 2px;
      background: rgba(255,255,255,0.12); margin-bottom: 22px;
    }
    .modal-avatar {
      font-size: 48px;
      background: linear-gradient(135deg, rgba(99,102,241,0.2), rgba(99,102,241,0.08));
      border: 2px solid rgba(99,102,241,0.3);
      border-radius: 50%;
      width: 76px; height: 76px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 14px;
      box-shadow: 0 0 30px rgba(99,102,241,0.2);
    }
    .modal-tag { font-size: 0.75em; color: #475569; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 4px; }
    .user-name { font-size: 26px; color: #c7d2fe; font-weight: 700; margin-bottom: 14px; }

    .time-badge {
      background: rgba(16,185,129,0.12);
      border: 1px solid rgba(16,185,129,0.28);
      color: #34d399;
      padding: 8px 22px; border-radius: 30px;
      font-size: 14px; font-weight: 600; margin-bottom: 16px;
    }

    /* Confidence bar */
    .confidence-wrap { width: 100%; margin-bottom: 20px; }
    .confidence-label {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 0.76em; color: #475569; margin-bottom: 7px;
    }
    .confidence-pct { font-size: 0.9em; color: #64748b; font-weight: 600; }
    .confidence-bar-bg {
      height: 6px; border-radius: 3px;
      background: rgba(255,255,255,0.07);
      overflow: hidden;
    }
    .confidence-bar-fill {
      height: 100%; border-radius: 3px;
      background: linear-gradient(90deg, #6366f1, #10b981);
      transition: width 0.6s cubic-bezier(0.34, 1.1, 0.64, 1);
    }

    .btn {
      border: none; border-radius: 16px; cursor: pointer; width: 100%;
      margin: 5px 0; font-family: 'Sarabun', sans-serif;
      transition: all 0.25s ease;
    }
    .btn-confirm {
      background: linear-gradient(135deg, #10b981, #059669);
      color: white; padding: 17px; font-size: 18px; font-weight: 700;
      box-shadow: 0 4px 24px rgba(16,185,129,0.3);
      margin-bottom: 10px;
    }
    .btn-confirm:hover:not(:disabled) {
      box-shadow: 0 8px 36px rgba(16,185,129,0.5); transform: translateY(-1px);
    }
    .btn-confirm:disabled { background: rgba(255,255,255,0.07); color: #334155; box-shadow: none; cursor: default; }
    .btn-cancel {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      color: #64748b; padding: 13px; font-size: 14px; font-weight: 600;
    }
    .btn-cancel:hover { background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.25); color: #fca5a5; }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: rgba(10,10,28,0.96);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      color: #e2e8f0; padding: 13px 24px; border-radius: 50px;
      font-size: 0.88em; font-weight: 600;
      z-index: 9999; opacity: 0;
      transition: all 0.38s cubic-bezier(0.34, 1.4, 0.64, 1);
      white-space: nowrap; pointer-events: none;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
      max-width: calc(100vw - 40px); text-align: center;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast-success { border-color: rgba(16,185,129,0.45); color: #34d399; }
    .toast-error   { border-color: rgba(239,68,68,0.45);  color: #fca5a5; }
    .toast-warning { border-color: rgba(245,158,11,0.45); color: #fcd34d; }
    .toast-info    { border-color: rgba(99,102,241,0.45); color: #a5b4fc; }

    /* ── Animations ── */
    @keyframes fadeIn    { from { opacity: 0; transform: translateY(10px) } to { opacity: 1; transform: translateY(0) } }
    @keyframes pulse     { 0%,100% { box-shadow: 0 0 0 0 rgba(16,185,129,0.4) } 50% { box-shadow: 0 0 0 6px rgba(16,185,129,0) } }
    @keyframes btnGlow   { 0%,100% { box-shadow: 0 4px 28px rgba(99,102,241,0.4) } 50% { box-shadow: 0 4px 44px rgba(99,102,241,0.65) } }
    @keyframes scanMove  { 0% { top: 12% } 50% { top: 82% } 100% { top: 12% } }
    @keyframes sheetUp   { from { opacity: 0; transform: translateY(40px) } to { opacity: 1; transform: translateY(0) } }
    @keyframes stepPulse { 0%,100% { box-shadow: 0 0 12px rgba(99,102,241,0.3) } 50% { box-shadow: 0 0 20px rgba(99,102,241,0.6) } }
  </style>
</head>
<body>
<div class="page-wrap">

  <div class="top-bar">
    <a href="index.html" class="back-btn">← กลับ</a>
    <span class="page-title">📷 สแกนเข้างาน</span>
    <div id="userBadge" style="
      display:none; align-items:center; gap:6px;
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.09);
      padding:4px 10px; border-radius:20px;
    "></div>
  </div>

  <!-- Init steps -->
  <div class="init-steps">
    <div class="step-item" id="step-gps">
      <div class="step-dot">1</div>
      <span class="step-label">GPS</span>
    </div>
    <div class="step-item" id="step-ai">
      <div class="step-dot">2</div>
      <span class="step-label">AI Model</span>
    </div>
    <div class="step-item" id="step-db">
      <div class="step-dot">3</div>
      <span class="step-label">ฐานข้อมูล</span>
    </div>
    <div class="step-item" id="step-ready">
      <div class="step-dot">✓</div>
      <span class="step-label">พร้อม</span>
    </div>
  </div>

  <!-- GPS status text -->
  <div id="gps-status"></div>

  <!-- GPS out of range alert -->
  <div id="gps-alert-box" class="gps-alert">
    ⚠️ คุณอยู่นอกพื้นที่ที่กำหนด<br>กรุณาเข้าใกล้จุดเช็คอินก่อน
    <br><button class="retry-btn" onclick="location.reload()">🔄 ลองใหม่</button>
  </div>

  <!-- Start button -->
  <button id="btnStart" onclick="startCamera()">📷 แตะเพื่อเริ่มสแกน</button>

  <!-- Camera -->
  <div class="video-container">
    <div class="scanner-frame">
      <div class="corner corner-tl"></div>
      <div class="corner corner-tr"></div>
      <div class="corner corner-bl"></div>
      <div class="corner corner-br"></div>
      <div class="scan-line" id="scanLine"></div>
    </div>
    <div class="face-guide">
      <div class="face-oval" id="faceOval">
        <span class="face-guide-label">วางใบหน้าในกรอบ</span>
      </div>
    </div>
    <div class="cam-placeholder" id="camPlaceholder">
      <div class="cam-placeholder-icon">📷</div>
      <div class="cam-placeholder-text">กดปุ่มด้านบนเพื่อเปิดกล้อง</div>
    </div>
    <div id="overlay-status">กำลังเตรียมระบบ...</div>
    <video id="video" autoplay muted playsinline></video>
  </div>

</div>

<!-- Confirm Modal (bottom sheet) -->
<div id="confirmModal" class="modal-overlay">
  <div class="modal-content">
    <div class="modal-handle"></div>
    <div class="modal-avatar">🙋</div>
    <p class="modal-tag">ตรวจพบบุคคล</p>
    <div class="user-name" id="modalName">...</div>
    <div id="modalTime" class="time-badge">--:--</div>
    <div class="confidence-wrap">
      <div class="confidence-label">
        <span>ความเหมือน</span>
        <span class="confidence-pct" id="confPct">0%</span>
      </div>
      <div class="confidence-bar-bg">
        <div class="confidence-bar-fill" id="confBar" style="width:0%"></div>
      </div>
    </div>
    <button class="btn btn-confirm" id="btnConfirm" onclick="confirmAttendance()">✅ ยืนยันเข้างาน</button>
    <button class="btn btn-cancel" onclick="cancelAttendance()">ไม่ใช่ฉัน — สแกนซ้ำ</button>
  </div>
</div>

<script>
  // Firebase แทน GAS — ไม่ต้องใช้ API_URL แล้ว
  const video         = document.getElementById('video');
  const confirmModal  = document.getElementById('confirmModal');
  const gpsStatus     = document.getElementById('gps-status');
  const gpsAlertBox   = document.getElementById('gps-alert-box');
  const btnStart      = document.getElementById('btnStart');
  const camPlaceholder = document.getElementById('camPlaceholder');

  const MATCH_THRESHOLD = 0.45;
  let knownFaces = [], scanInterval = null, currentMatch = null;
  let currentLat = null, currentLng = null;

  // ── Toast ──
  function toast(msg, type = 'info', dur = 3500) {
    const el = document.createElement('div');
    el.className = `toast toast-${type}`;
    el.textContent = msg;
    document.body.appendChild(el);
    requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add('show')));
    setTimeout(() => { el.classList.remove('show'); setTimeout(() => el.remove(), 420); }, dur);
  }

  // ── Step helpers ──
  function stepActive(id) {
    document.getElementById(id).classList.remove('done');
    document.getElementById(id).classList.add('active');
  }
  function stepDone(id) {
    document.getElementById(id).classList.remove('active');
    document.getElementById(id).classList.add('done');
  }

  function setOverlay(text, color = '') {
    const el = document.getElementById('overlay-status');
    el.textContent = text;
    el.style.background = color || 'rgba(0,0,0,0.6)';
  }

  window.addEventListener('load', init);

  async function init() {
    try {
      // Step 0: LINE Auth ก่อนทำอะไรทั้งนั้น
      setOverlay('ยืนยันตัวตน LINE...');
      const authed = await LiffAuth.init();
      if (!authed) return; // กำลัง redirect
      renderUserBadge('userBadge');

      // Step 1: GPS
      stepActive('step-gps');
      setOverlay('ตรวจสอบ GPS...');
      await checkGPS();
    } catch (e) {
      setOverlay('❌ ' + e.message);
      toast(e.message, 'error', 6000);
    }
  }

  // ── GPS ──
  function checkGPS() {
    return new Promise((resolve, reject) => {
      if (!navigator.geolocation) { reject(new Error('Browser ไม่รองรับ GPS')); return; }
      navigator.geolocation.getCurrentPosition(
        async pos => {
          currentLat = pos.coords.latitude;
          currentLng = pos.coords.longitude;
          try {
            const config = await DB.getConfig();
            if (!config.lat || !config.lng || config.radius == 0) {
              gpsStatus.innerHTML = '<span style="color:#34d399;font-size:.8em">📍 GPS: ไม่จำกัดพื้นที่</span>';
              stepDone('step-gps');
              resolve(); initFaceSystem();
              return;
            }
            const dist = haversineKm(currentLat, currentLng, config.lat, config.lng);
            if (dist <= config.radius) {
              gpsStatus.innerHTML = `<span style="color:#34d399;font-size:.8em">📍 ห่างจุดเช็คอิน ${(dist * 1000).toFixed(0)} ม. ✓</span>`;
              stepDone('step-gps');
              resolve(); initFaceSystem();
            } else {
              gpsStatus.innerHTML = `<span style="color:#f87171;font-size:.8em">📍 ห่างเกิน ${(dist * 1000).toFixed(0)} ม. (กำหนด ${(config.radius * 1000).toFixed(0)} ม.)</span>`;
              gpsAlertBox.style.display = 'block';
              setOverlay('Out of Range');
              toast('คุณอยู่นอกพื้นที่ที่กำหนด', 'error', 5000);
            }
          } catch (e) { reject(new Error('เชื่อมต่อ API ไม่ได้: ' + e.message)); }
        },
        () => reject(new Error('กรุณาเปิด GPS'))
      );
    });
  }

  // ── Load AI ──
  async function initFaceSystem() {
    stepActive('step-ai');
    setOverlay('โหลด AI Model...');
    const MODEL_URL = 'models';
    try {
      await Promise.all([
        faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL),
        faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
        faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
      ]);
      stepDone('step-ai');
      loadFaceDatabase();
    } catch (e) {
      setOverlay('โหลด AI ล้มเหลว');
      toast('โหลด AI Model ล้มเหลว: ' + e.message, 'error', 6000);
    }
  }

  // ── Load DB ──
  async function loadFaceDatabase() {
    stepActive('step-db');
    setOverlay('โหลดข้อมูลพนักงาน...');
    try {
      const data = await DB.getKnownFaces();
      if (!data || data.length === 0) {
        setOverlay('ไม่พบข้อมูลพนักงาน');
        toast('ไม่พบข้อมูลพนักงาน กรุณาลงทะเบียนก่อน', 'warning', 6000);
        return;
      }
      knownFaces = data.map(u => ({ name: u.label, descriptor: new Float32Array(u.descriptor) }));
      stepDone('step-db'); stepDone('step-ready');
      setOverlay('มองกล้องเพื่อสแกน');
      btnStart.style.display = 'inline-block';
    } catch (e) {
      setOverlay('โหลดฐานข้อมูลล้มเหลว');
      toast('โหลดฐานข้อมูลล้มเหลว: ' + e.message, 'error', 6000);
    }
  }

  // ── Camera ──
  function startCamera() {
    btnStart.style.display = 'none';
    setOverlay('กำลังเปิดกล้อง...');
    navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } })
      .then(stream => {
        video.srcObject = stream;
        video.classList.add('active');
        camPlaceholder.style.display = 'none';
        setOverlay('มองกล้องเพื่อสแกน');
        document.getElementById('scanLine').classList.add('active');
        startScanLoop();
      })
      .catch(err => {
        toast('เปิดกล้องไม่ได้: ' + err.message, 'error');
        btnStart.style.display = 'inline-block';
      });
  }

  // ── Scan Loop ──
  function startScanLoop() {
    if (scanInterval) clearInterval(scanInterval);
    scanInterval = setInterval(async () => {
      if (video.paused || video.ended) return;
      const det = await faceapi.detectSingleFace(video).withFaceLandmarks().withFaceDescriptor();
      const oval = document.getElementById('faceOval');
      if (det) {
        oval.classList.add('detected');
        const best = findBestMatch(det.descriptor);
        if (best.distance < MATCH_THRESHOLD) {
          clearInterval(scanInterval);
          document.getElementById('scanLine').classList.remove('active');
          showModal(best);
        } else {
          setOverlay('ไม่รู้จัก (' + best.distance.toFixed(2) + ')');
          document.getElementById('overlay-status').style.background = 'rgba(239,68,68,0.55)';
        }
      } else {
        oval.classList.remove('detected');
        setOverlay('มองกล้องเพื่อสแกน');
        document.getElementById('overlay-status').style.background = 'rgba(0,0,0,0.6)';
      }
    }, 500);
  }

  function findBestMatch(desc) {
    let best = { name: 'unknown', distance: 1.0 };
    knownFaces.forEach(u => {
      const d = faceapi.euclideanDistance(desc, u.descriptor);
      if (d < best.distance) best = { name: u.name, distance: d };
    });
    return best;
  }

  // ── Modal ──
  let currentType = 'checkin'; // 'checkin' | 'checkout'

  async function showModal(match) {
    currentMatch = match.name;
    document.getElementById('modalName').textContent = match.name;

    // ตรวจว่าวันนี้เช็คอินไปแล้วหรือยัง
    const today = await DB.getTodayRecord(match.name);
    if (today?.checkin && !today?.checkout) {
      currentType = 'checkout';
      document.getElementById('modalTime').textContent =
        'เวลาออกงาน: ' + new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' }) + ' น.';
      document.getElementById('btnConfirm').textContent  = '🚪 ยืนยันออกงาน';
      document.getElementById('btnConfirm').style.background = 'linear-gradient(135deg,#f59e0b,#d97706)';
    } else {
      currentType = 'checkin';
      document.getElementById('modalTime').textContent =
        'เวลาเข้างาน: ' + new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' }) + ' น.';
      document.getElementById('btnConfirm').textContent  = '✅ ยืนยันเข้างาน';
      document.getElementById('btnConfirm').style.background = 'linear-gradient(135deg,#10b981,#059669)';
    }

    const pct = Math.round((1 - match.distance) * 100);
    document.getElementById('confPct').textContent = pct + '%';
    requestAnimationFrame(() => { document.getElementById('confBar').style.width = pct + '%'; });
    confirmModal.style.display = 'flex';
  }

  async function confirmAttendance() {
    const btn = document.getElementById('btnConfirm');
    btn.disabled = true; btn.textContent = '⏳ กำลังบันทึก...';
    try {
      const data = await DB.logAttendance(
        currentMatch, currentLat, currentLng, LiffAuth.getUserId(), currentType
      );
      if (data.error) {
        toast('⚠️ ' + data.error, 'warning', 4000);
        btn.disabled = false;
        btn.textContent = currentType === 'checkin' ? '✅ ยืนยันเข้างาน' : '🚪 ยืนยันออกงาน';
        return;
      }
      confirmModal.style.display = 'none';
      toast('✅ ' + data.message, 'success', 3000);
      setTimeout(() => { window.location.href = 'index.html'; }, 1800);
    } catch (e) {
      toast('❌ บันทึกล้มเหลว: ' + e.message, 'error');
      btn.disabled = false;
      btn.textContent = currentType === 'checkin' ? '✅ ยืนยันเข้างาน' : '🚪 ยืนยันออกงาน';
    }
  }

  function cancelAttendance() {
    confirmModal.style.display = 'none';
    currentMatch = null;
    if (scanInterval) clearInterval(scanInterval);
    if (video.srcObject) { video.srcObject.getTracks().forEach(t => t.stop()); video.srcObject = null; }
    video.classList.remove('active');
    document.getElementById('scanLine').classList.remove('active');
    document.getElementById('faceOval').classList.remove('detected');
    camPlaceholder.style.display = 'flex';
    setOverlay('มองกล้องเพื่อสแกน');
    btnStart.style.display = 'inline-block';
  }

  // haversineKm ย้ายไปอยู่ใน db.js แล้ว (_haversineKm)
</script>
</body>
